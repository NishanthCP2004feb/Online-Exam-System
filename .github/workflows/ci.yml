name: Java Build Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download servlet-api dependency
        run: |
          mkdir -p .build-cache/lib
          curl -L -o .build-cache/lib/javax.servlet-api-4.0.1.jar \
            https://repo1.maven.org/maven2/javax/servlet/javax.servlet-api/4.0.1/javax.servlet-api-4.0.1.jar

      - name: Compile Java sources
        run: |
          mkdir -p web/WEB-INF/classes
          find src -name "*.java" > sources.txt
          javac -encoding UTF-8 \
            -cp ".build-cache/lib/javax.servlet-api-4.0.1.jar:web/WEB-INF/lib/mysql-connector-j-8.4.0.jar" \
            -d web/WEB-INF/classes \
            @sources.txt
